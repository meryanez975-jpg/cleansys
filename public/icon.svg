  <rect x="176" y="220" width="160" height="30" rx="12" fill="#BFDBFE"/>
  <rect x="176" y="234" width="160" height="16" fill="#BFDBFE"/>

  <!-- Asa del balde -->
  <path d="M210 220 Q256 170 302 220" stroke="white" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- Agua/burbujas en el balde -->
  <circle cx="220" cy="295" r="10" fill="#3B82F6" opacity="0.4"/>
  <circle cx="256" cy="285" r="14" fill="#3B82F6" opacity="0.4"/>
  <circle cx="292" cy="295" r="10" fill="#3B82F6" opacity="0.4"/>

