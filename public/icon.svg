  <line x1="212" y1="170" x2="205" y2="210" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="228" y1="170" x2="224" y2="215" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="244" y1="170" x2="243" y2="217" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="260" y1="170" x2="262" y2="217" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="276" y1="170" x2="280" y2="215" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="292" y1="170" x2="299" y2="210" stroke="white" stroke-width="6" stroke-linecap="round"/>

  <!-- Burbujas decorativas -->
  <circle cx="370" cy="140" r="18" fill="white" opacity="0.2"/>
  <circle cx="395" cy="170" r="10" fill="white" opacity="0.15"/>
